<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion — Analizador de Reportes IA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-dot {
            width: 12px; height: 12px;
            background: #E53935;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }
        .logo-text {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: #fff;
            vertical-align: middle;
        }

        .card {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 16px;
            padding: 32px;
        }

        .card h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }
        .card p {
            font-size: 13px;
            color: #555;
            margin-bottom: 28px;
        }

        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .field input {
            width: 100%;
            padding: 12px 14px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
            outline: none;
        }
        .field input:focus {
            border-color: #1565C0;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #E53935;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-login:hover { background: #c62828; }

        .error-msg {
            background: #1a0a0a;
            border: 1px solid #E53935;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #E53935;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            font-size: 11px;
            color: #2a2a2a;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">
        <span class="logo-dot"></span>
        <span class="logo-text">ANALIZADOR DE REPORTES IA</span>
    </div>

    <div class="card">
        <h1>Bienvenido</h1>
        <p>Inicia sesion para acceder a tu cuenta</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="error-msg">⚠️ {{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="field">
                <label>Usuario</label>
                <input type="text" name="username" placeholder="Tu nombre de usuario" required autofocus>
            </div>
            <div class="field">
                <label>Contrasena</label>
                <input type="password" name="password" placeholder="Tu contrasena" required>
            </div>
            <button type="submit" class="btn-login">Iniciar Sesion →</button>
        </form>
    </div>

    <footer>Analizador de Reportes con IA · Acceso restringido</footer>
</div>

</body>
</html>
